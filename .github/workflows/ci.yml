name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

defaults:
  run:
    working-directory: neuralframe

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: neuralframe
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --exclude neuralframe-py -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: neuralframe
      - run: cargo build --workspace --exclude neuralframe-py
      - run: cargo test --workspace --exclude neuralframe-py --lib
      - run: cargo test --workspace --exclude neuralframe-py --test '*'

  bench-compile:
    name: Benchmarks Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: neuralframe
      - run: cargo bench -p neuralframe-vector --no-run

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: neuralframe
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --exclude neuralframe-py --no-deps

  python-bindings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install maturin
      - run: cd crates/neuralframe-py && maturin build
